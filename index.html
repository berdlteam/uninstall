<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>We are sad to see you go</title>

    <style>
        :root {
            --primary: #111827;
            --accent: #2563eb;
            --border: #e5e7eb;
            --bg: #f9fafb;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            padding: 40px 16px;
        }

        .container {
            background: white;
            width: 100%;
            max-width: 700px;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        }

        progress {
            width: 100%;
            height: 8px;
            margin-bottom: 30px;
            appearance: none;
        }

        progress::-webkit-progress-bar {
            background: #eee;
            border-radius: 8px;
        }

        progress::-webkit-progress-value {
            background: var(--accent);
            border-radius: 8px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 28px;
            color: var(--primary);
        }

        .subtitle {
            margin-bottom: 30px;
            color: #6b7280;
            font-size: 16px;
        }

        .section-title {
            font-weight: 600;
            margin-bottom: 16px;
            font-size: 18px;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .checkbox-item:hover {
            border-color: var(--accent);
            background: #f0f6ff;
        }

        .checkbox-item input {
            transform: scale(1.2);
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            resize: vertical;
            font-size: 14px;
            margin-top: 10px;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        button {
            margin-top: 30px;
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: var(--accent);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s ease;
        }

        button:hover {
            background: #1e4fd8;
        }

        .success {
            text-align: center;
            padding: 40px 0;
            display: none;
        }

        .success h2 {
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div class="container">

        <form id="feedbackForm">

            <progress max="2" value="1"></progress>

            <h1>We are sad to see you go 🥺</h1>
            <div class="subtitle">
                Help us understand how we can make Highlight Text better for you and others.
            </div>

            <div class="section-title">
                1. Why are you deleting the extension? *
            </div>

            <div class="checkbox-group">
                <label class="checkbox-item">
                    <input type="checkbox" name="reason" value="buggy">
                    🪲 The extension was buggy
                </label>

                <label class="checkbox-item">
                    <input type="checkbox" name="reason" value="did_not_use">
                    😶 I did not use it much
                </label>

                <label class="checkbox-item">
                    <input type="checkbox" name="reason" value="missing_features">
                    ⛓️ Some features were missing
                </label>

                <label class="checkbox-item">
                    <input type="checkbox" name="reason" value="other_tool">
                    🙏 I prefer another tool
                </label>

                <label class="checkbox-item">
                    <input type="checkbox" name="reason" value="just_testing">
                    👀 I was just testing it
                </label>

                <label class="checkbox-item">
                    <input type="checkbox" name="reason" value="other">
                    Other
                </label>
            </div>

            <div class="section-title">
                2. Could you share more details? (Optional)
            </div>

            <textarea name="details" placeholder="Tell us what went wrong, what could be better..."></textarea>

            <!-- скрытое поле для объединенных чекбоксов -->
            <input type="hidden" name="reason_combined">

            <button type="submit">
                Send Feedback →
            </button>

        </form>

        <div class="success" id="successMessage">
            <h2>Thank you for your feedback ❤️</h2>
            <p>We appreciate your time and will use this to improve.</p>
        </div>

    </div>

    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.emailjs.com/sdk/3.2.0/email.min.js"></script>
    <script type="text/javascript">
        const form = document.getElementById("feedbackForm");

        form.addEventListener("submit", function (e) {
            e.preventDefault();

            // объединяем все выбранные причины
            const checkedReasons = Array.from(document.querySelectorAll('input[name="reason"]:checked'))
                .map(cb => cb.value)
                .join(', ');

            // ставим в скрытое поле
            form.querySelector('input[name="reason_combined"]').value = checkedReasons;

            // отправка формы через EmailJS
            emailjs.sendForm('service_x5ebvtl', 'feedback_template', this)
                .then(() => {
                    form.style.display = "none";
                    document.getElementById("successMessage").style.display = "block";
                }, (err) => {
                    alert("Failed to send feedback. Please try again.");
                    console.error(err);
                });
        });
    </script>

</body>

</html>
